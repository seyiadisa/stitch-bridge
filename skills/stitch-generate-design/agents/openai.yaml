interface:
  display_name: "Stitch Generate Design"
  short_description: "Create, edit, and vary Stitch screens"
  default_prompt: "Use $stitch-generate-design to generate or edit Stitch screens from this prompt and keep the design system aligned."

dependencies:
  tools:
    - type: "mcp"
      value: "stitch"
      description: "Bundled Stitch MCP server for screen generation and edits"
      transport: "streamable_http"
      url: "https://stitch.googleapis.com/mcp"

policy:
  allow_implicit_invocation: true
