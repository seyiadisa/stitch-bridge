interface:
  display_name: "Stitch Design MD"
  short_description: "Synthesize a DESIGN.md from existing Stitch screens"
  default_prompt: "Use $stitch-design-md to analyze this Stitch project and write a native .stitch/DESIGN.md."

dependencies:
  tools:
    - type: "mcp"
      value: "stitch"
      description: "Bundled Stitch MCP server for reading project and screen artifacts"
      transport: "streamable_http"
      url: "https://stitch.googleapis.com/mcp"

policy:
  allow_implicit_invocation: true
