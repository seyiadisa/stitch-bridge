interface:
  display_name: "Stitch Extract Design MD"
  short_description: "Derive a DESIGN.md from frontend source code"
  default_prompt: "Use $stitch-extract-design-md to analyze this frontend repo and write a Stitch-ready .stitch/DESIGN.md."

dependencies:
  tools:
    - type: "mcp"
      value: "stitch"
      description: "Bundled Stitch MCP server for downstream design-system workflows"
      transport: "streamable_http"
      url: "https://stitch.googleapis.com/mcp"

policy:
  allow_implicit_invocation: true
