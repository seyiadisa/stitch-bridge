interface:
  display_name: "Stitch Upload to Stitch"
  short_description: "Upload HTML and visual assets into Stitch"
  default_prompt: "Use $stitch-upload-to-stitch to upload this HTML or image asset into the target Stitch project."

dependencies:
  tools:
    - type: "mcp"
      value: "stitch"
      description: "Bundled Stitch MCP server for project discovery before upload"
      transport: "streamable_http"
      url: "https://stitch.googleapis.com/mcp"

policy:
  allow_implicit_invocation: true
