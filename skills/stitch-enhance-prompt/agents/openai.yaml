interface:
  display_name: "Stitch Enhance Prompt"
  short_description: "Turn rough UI ideas into Stitch-ready prompts"
  default_prompt: "Use $stitch-enhance-prompt to refine this rough UI idea into a structured prompt for Stitch."

dependencies:
  tools:
    - type: "mcp"
      value: "stitch"
      description: "Bundled Stitch MCP server for downstream generation workflows"
      transport: "streamable_http"
      url: "https://stitch.googleapis.com/mcp"

policy:
  allow_implicit_invocation: true
