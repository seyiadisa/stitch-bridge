interface:
  display_name: "Stitch Code to Design"
  short_description: "Ingest an existing frontend app into Stitch"
  default_prompt: "Use $stitch-code-to-design to extract static HTML, derive a DESIGN.md, and upload this app into Stitch."

dependencies:
  tools:
    - type: "mcp"
      value: "stitch"
      description: "Bundled Stitch MCP server for project lookup and design creation"
      transport: "streamable_http"
      url: "https://stitch.googleapis.com/mcp"

policy:
  allow_implicit_invocation: true
